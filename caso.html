<!doctype html>
<html lang="pt-BR">
  <head>
    <!-- <base href="http://localhost:8000/public/"> -->
    <base href="https://pichok.github.io/practicar-ecg/public/">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caso — Praticar ECG</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <script>
      try {
        var t = localStorage.getItem("ecg-theme");
        if (t === "dark") document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100">
    <header class="border-b border-slate-200 bg-white dark:border-slate-800 dark:bg-slate-900">
      <div class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-xl font-bold sm:text-2xl" data-i18n="app_title">Praticar ECG</h1>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <nav class="mr-2 flex gap-1 text-sm">
            <a href="./../index.html" class="rounded-md px-3 py-1.5 font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800" data-i18n="nav_train">Treinar</a>
            <a href="./../biblioteca.html" class="rounded-md px-3 py-1.5 font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800" data-i18n="nav_library">Biblioteca</a>
          </nav>
          <label for="idioma" class="text-sm font-medium" data-i18n="label_language">Idioma:</label>
          <select id="idioma" class="rounded-md border border-slate-300 bg-white px-2 py-1.5 text-sm shadow-sm dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100"></select>
          <button type="button" class="btn-theme rounded-md border border-slate-300 bg-white px-2.5 py-1.5 text-sm shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-6">
      <div class="mb-4 flex flex-wrap gap-2">
        <a href="./../biblioteca.html" class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm shadow-sm hover:bg-slate-100 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700" data-i18n="back_to_library">← Voltar à biblioteca</a>
        <a id="btn-train-cat" href="./../index.html" class="rounded-md bg-blue-600 px-3 py-1.5 text-sm font-medium text-white shadow-sm hover:bg-blue-700" data-i18n="train_this">Treinar esta categoria</a>
      </div>

      <div id="loading" class="rounded-lg border border-slate-200 bg-white p-8 text-center shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <p data-i18n="loading">Carregando...</p>
      </div>
      <div id="error" class="hidden rounded-lg border border-rose-200 bg-rose-50 p-6 text-center text-rose-800 dark:border-rose-900 dark:bg-rose-950 dark:text-rose-200">
        <p id="error-msg" data-i18n="case_not_found">Caso não encontrado.</p>
      </div>

      <article id="case-card" class="hidden overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="border-b border-slate-200 bg-slate-50 px-5 py-3 dark:border-slate-800 dark:bg-slate-800/50">
          <span id="case-categoria" class="inline-block rounded-full bg-blue-100 px-3 py-0.5 text-xs font-medium uppercase tracking-wide text-blue-800 dark:bg-blue-900 dark:text-blue-200"></span>
        </div>
        <div class="px-5 py-5">
          <h2 class="mb-1 text-sm font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400" data-i18n="case_clinical">Caso clínico</h2>
          <p id="case-clinico" class="text-lg leading-relaxed text-slate-800 dark:text-slate-100"></p>
        </div>
        <div class="border-t border-slate-200 bg-slate-100 p-3 dark:border-slate-800 dark:bg-slate-800/40">
          <img id="case-imagem" src="" alt="ECG" class="mx-auto max-h-[500px] w-full cursor-zoom-in rounded-lg bg-grid object-contain shadow" />
          <p class="mt-2 text-center text-xs text-slate-500 dark:text-slate-400" data-i18n="click_zoom"></p>
        </div>
        <div class="px-5 py-5">
          <div id="reveal-wrap" class="hidden"></div>
          <div id="gabarito">
            <div class="rounded-lg border border-emerald-200 bg-emerald-50 p-4 dark:border-emerald-900 dark:bg-emerald-950/40">
              <h3 class="mb-1 text-sm font-semibold uppercase tracking-wide text-emerald-800 dark:text-emerald-300" data-i18n="diagnosis">Diagnóstico</h3>
              <p id="case-diagnostico" class="text-lg font-medium text-emerald-950 dark:text-emerald-100"></p>
            </div>
            <div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-800/50">
              <h3 class="mb-1 text-sm font-semibold uppercase tracking-wide text-slate-700 dark:text-slate-300" data-i18n="interpretation">Interpretação</h3>
              <div id="case-interpretacao" class="whitespace-pre-line text-slate-800 dark:text-slate-100"></div>
            </div>
          </div>
        </div>
      </article>

      <footer class="mt-10 text-center text-xs text-slate-500 dark:text-slate-400" data-i18n="footer"></footer>
    </main>

    <div id="zoom-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90 p-4" role="dialog" aria-modal="true">
      <button id="zoom-close" type="button" class="absolute right-4 top-4 rounded-full bg-white/10 px-4 py-2 text-white hover:bg-white/20" data-i18n="close">✕ Fechar</button>
      <div class="absolute left-1/2 top-4 flex -translate-x-1/2 gap-2">
        <button id="zoom-out" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">−</button>
        <button id="zoom-reset" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">1x</button>
        <button id="zoom-in" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">+</button>
      </div>
      <div id="zoom-viewport" class="h-full w-full overflow-hidden">
        <img id="zoom-img" src="" alt="ECG ampliado" class="mx-auto block max-h-full origin-center cursor-grab select-none bg-grid" draggable="false" />
      </div>
    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/i18n.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/case.js"></script>
    <script src="./js/detail.js"></script>
  </body>
</html>
