<!doctype html>
<html lang="pt-BR">
  <head>
    <base href="https://pichok.github.io/practicar-ecg/public/">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treinamento de ECG — Leitura de Eletrocardiogramas</title>
    <meta
      name="description"
      content="Treine sua leitura de eletrocardiogramas (ECG) com casos clínicos reais organizados por categoria. Ideal para estudantes de medicina, residentes e profissionais de saúde."
    />
    <meta property="og:title" content="Treinamento de ECG" />
    <meta
      property="og:description"
      content="Pratique a interpretação de eletrocardiogramas com casos clínicos reais."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-5xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-xl font-bold text-slate-900 sm:text-2xl">
            Praticar <span class="text-blue-700">ECG</span>
          </h1>
          <p class="text-xs text-slate-500 sm:text-sm">
            Treinamento de leitura de eletrocardiogramas
          </p>
        </div>
        <div class="flex items-center gap-2">
          <label for="categoria" class="text-sm font-medium text-slate-700">Categoria:</label>
          <select
            id="categoria"
            class="rounded-md border border-slate-300 bg-white px-3 py-1.5 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          >
            <option value="todas">Todas</option>
          </select>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 py-6">
      <!-- Painel de estatísticas -->
      <section
        id="stats"
        class="mb-6 grid grid-cols-2 gap-3 sm:grid-cols-4"
        aria-label="Estatísticas do treinamento"
      >
        <div class="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
          <div class="text-xs uppercase tracking-wide text-slate-500">Acertos</div>
          <div id="stat-acertos" class="text-2xl font-bold text-emerald-600">0</div>
        </div>
        <div class="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
          <div class="text-xs uppercase tracking-wide text-slate-500">Erros</div>
          <div id="stat-erros" class="text-2xl font-bold text-rose-600">0</div>
        </div>
        <div class="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
          <div class="text-xs uppercase tracking-wide text-slate-500">Taxa de acerto</div>
          <div id="stat-taxa" class="text-2xl font-bold text-slate-800">—</div>
        </div>
        <div class="rounded-lg border border-slate-200 bg-white p-3 shadow-sm">
          <div class="text-xs uppercase tracking-wide text-slate-500">Progresso</div>
          <div id="stat-progresso" class="text-2xl font-bold text-blue-700">0/0</div>
        </div>
      </section>

      <div class="mb-6">
        <div class="h-2 w-full overflow-hidden rounded-full bg-slate-200">
          <div id="progress-bar" class="h-full w-0 bg-blue-600 transition-all duration-300"></div>
        </div>
      </div>

      <!-- Estado de carregamento -->
      <div id="loading" class="rounded-lg border border-slate-200 bg-white p-8 text-center shadow-sm">
        <p class="text-slate-600">Carregando casos clínicos...</p>
      </div>

      <!-- Erro -->
      <div
        id="error"
        class="hidden rounded-lg border border-rose-200 bg-rose-50 p-6 text-center text-rose-800 shadow-sm"
      >
        <p id="error-msg" class="font-medium">Erro ao carregar os dados.</p>
      </div>

      <!-- Card do caso -->
      <article
        id="case-card"
        class="hidden overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm"
      >
        <div class="border-b border-slate-200 bg-slate-50 px-5 py-3">
          <span
            id="case-categoria"
            class="inline-block rounded-full bg-blue-100 px-3 py-0.5 text-xs font-medium uppercase tracking-wide text-blue-800"
          ></span>
        </div>

        <div class="px-5 py-5">
          <h2 class="mb-1 text-sm font-semibold uppercase tracking-wide text-slate-500">
            Caso clínico
          </h2>
          <p id="case-clinico" class="text-lg leading-relaxed text-slate-800"></p>
        </div>

        <div class="border-t border-slate-200 bg-slate-100 p-3">
          <img
            id="case-imagem"
            src=""
            alt="Eletrocardiograma"
            class="mx-auto max-h-[500px] w-full cursor-zoom-in rounded-lg bg-white bg-grid object-contain shadow"
          />
          <p class="mt-2 text-center text-xs text-slate-500">
            Clique na imagem para ampliar
          </p>
        </div>

        <!-- Gabarito (oculto inicialmente) -->
        <div class="px-5 py-5">
          <div id="reveal-wrap" class="text-center">
            <button
              id="btn-revelar"
              type="button"
              class="rounded-lg bg-blue-600 px-6 py-3 text-base font-semibold text-white shadow transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
              Ver Diagnóstico
            </button>
          </div>

          <div id="gabarito" class="hidden">
            <div class="rounded-lg border border-emerald-200 bg-emerald-50 p-4">
              <h3 class="mb-1 text-sm font-semibold uppercase tracking-wide text-emerald-800">
                Diagnóstico
              </h3>
              <p id="case-diagnostico" class="text-lg font-medium text-emerald-950"></p>
            </div>
            <div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-4">
              <h3 class="mb-1 text-sm font-semibold uppercase tracking-wide text-slate-700">
                Interpretação
              </h3>
              <div id="case-interpretacao" class="whitespace-pre-line text-slate-800"></div>
            </div>

            <!-- Feedback -->
            <div id="feedback" class="mt-5 flex flex-col gap-3 sm:flex-row sm:justify-center">
              <button
                id="btn-acertei"
                type="button"
                class="rounded-lg bg-emerald-600 px-6 py-3 text-base font-semibold text-white shadow transition hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
              >
                ✓ Acertei
              </button>
              <button
                id="btn-errei"
                type="button"
                class="rounded-lg bg-rose-600 px-6 py-3 text-base font-semibold text-white shadow transition hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-rose-500 focus:ring-offset-2"
              >
                ✗ Errei
              </button>
            </div>
          </div>
        </div>

        <div class="flex flex-col-reverse gap-2 border-t border-slate-200 bg-slate-50 px-5 py-3 sm:flex-row sm:justify-between">
          <button
            id="btn-reset"
            type="button"
            class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-100"
          >
            Reiniciar progresso
          </button>
          <button
            id="btn-proximo"
            type="button"
            class="rounded-md bg-slate-900 px-5 py-2 text-sm font-semibold text-white shadow transition hover:bg-slate-800"
          >
            Próximo ECG →
          </button>
        </div>
      </article>

      <footer class="mt-10 text-center text-xs text-slate-500">
        Casos e imagens: <a href="http://www.ecglibrary.com/" class="underline hover:text-slate-700" target="_blank" rel="noopener">ecglibrary.com</a> · Uso educacional.
      </footer>
    </main>

    <!-- Modal de zoom -->
    <div
      id="zoom-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-black/90 p-4"
      role="dialog"
      aria-modal="true"
    >
      <button
        id="zoom-close"
        type="button"
        class="absolute right-4 top-4 rounded-full bg-white/10 px-4 py-2 text-white hover:bg-white/20"
        aria-label="Fechar"
      >
        ✕ Fechar
      </button>
      <div class="absolute left-1/2 top-4 flex -translate-x-1/2 gap-2">
        <button id="zoom-out" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">−</button>
        <button id="zoom-reset" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">1x</button>
        <button id="zoom-in" class="rounded bg-white/10 px-3 py-1.5 text-white hover:bg-white/20">+</button>
      </div>
      <div id="zoom-viewport" class="h-full w-full overflow-hidden">
        <img
          id="zoom-img"
          src=""
          alt="Eletrocardiograma ampliado"
          class="mx-auto block max-h-full origin-center cursor-grab select-none transition-transform bg-grid"
          draggable="false"
        />
      </div>
    </div>

    <script src="./js/data.js"></script>
    <script src="./js/case.js"></script>
    <script src="./js/quiz.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
